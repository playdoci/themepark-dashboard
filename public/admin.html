<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>테마파크 인사이트 — 관리자</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#fff;--bg2:#f7f7f5;--bg3:#f0ede8;
  --txt:#1a1a1a;--txt2:#666;--txt3:#aaa;
  --border:rgba(0,0,0,0.12);--border2:rgba(0,0,0,0.22);
  --blue:#185FA5;--blue-bg:#E6F1FB;
  --green:#3B6D11;--green-bg:#EAF3DE;
  --red:#993C1D;--red-bg:#FAECE7;
  --amber:#854F0B;--amber-bg:#FAEEDA;
  --radius:12px;--radius-sm:8px;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans KR',sans-serif;background:var(--bg3);color:var(--txt);max-width:480px;margin:0 auto;min-height:100vh;padding-bottom:40px;}

/* 로그인 */
.login-wrap{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px;}
.login-card{background:var(--bg);border:0.5px solid var(--border);border-radius:var(--radius);padding:32px 24px;width:100%;}
.login-title{font-size:20px;font-weight:600;color:var(--txt);margin-bottom:6px;}
.login-sub{font-size:13px;color:var(--txt2);margin-bottom:24px;}
.login-input{width:100%;padding:10px 14px;border:0.5px solid var(--border2);border-radius:var(--radius-sm);font-size:15px;color:var(--txt);background:var(--bg);margin-bottom:12px;}
.login-btn{width:100%;padding:12px;background:var(--txt);color:var(--bg);border:none;border-radius:var(--radius-sm);font-size:15px;font-weight:600;cursor:pointer;}
.login-error{font-size:12px;color:var(--red);margin-top:8px;display:none;}

/* 관리자 */
.admin-wrap{display:none;}
.topbar{background:var(--bg);border-bottom:0.5px solid var(--border);padding:12px 16px;position:sticky;top:0;z-index:100;display:flex;justify-content:space-between;align-items:center;}
.topbar-title{font-size:17px;font-weight:600;color:var(--txt);}
.logout-btn{font-size:12px;padding:5px 10px;border-radius:20px;border:0.5px solid var(--border2);background:none;color:var(--txt2);cursor:pointer;}
.content{padding:14px;}
.sec-label{font-size:11px;font-weight:500;color:var(--txt2);text-transform:uppercase;letter-spacing:.7px;margin-bottom:8px;}
.park-select{width:100%;padding:10px 12px;border:0.5px solid var(--border2);border-radius:var(--radius-sm);font-size:14px;color:var(--txt);background:var(--bg);margin-bottom:16px;}
.info-box{background:var(--amber-bg);border-radius:var(--radius-sm);padding:10px 12px;margin-bottom:14px;font-size:12px;color:var(--amber);line-height:1.6;}

/* 카드 */
.card{background:var(--bg);border:0.5px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-bottom:12px;}
.card-hd{background:var(--bg2);padding:10px 14px;font-size:13px;font-weight:600;color:var(--txt);display:flex;justify-content:space-between;align-items:center;}
.card-hd-note{font-size:10px;font-weight:400;color:var(--txt2);}

/* 시즌 행 */
.field-row{padding:11px 14px;border-top:0.5px solid var(--border);display:flex;align-items:center;gap:10px;}
.field-label{font-size:12px;color:var(--txt2);min-width:70px;flex-shrink:0;}
.field-input{flex:1;padding:7px 10px;border:0.5px solid var(--border2);border-radius:var(--radius-sm);font-size:13px;color:var(--txt);background:var(--bg);}

/* 티켓 섹션 */
.ticket-block{border-top:0.5px solid var(--border);}
.ticket-block-hd{padding:8px 14px;background:var(--bg3);display:flex;align-items:center;gap:6px;}
.ticket-name{font-size:12px;font-weight:600;color:var(--txt);}
.ticket-time{font-size:10px;color:var(--txt2);}
.price-row{display:flex;align-items:center;justify-content:space-between;padding:9px 14px;border-top:0.5px solid var(--border);}
.price-lbl{font-size:12px;color:var(--txt2);}
.price-input-wrap{display:flex;align-items:center;gap:5px;}
.price-input{width:100px;padding:6px 10px;border:0.5px solid var(--border2);border-radius:var(--radius-sm);font-size:14px;font-weight:500;color:var(--txt);background:var(--bg);text-align:right;}
.price-unit{font-size:12px;color:var(--txt2);}

/* 채널 할인 */
.ch-block{border-top:0.5px solid var(--border);}
.ch-hd{display:flex;align-items:center;padding:9px 14px;gap:8px;background:var(--bg);}
.ch-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.ch-name-txt{font-size:12px;font-weight:500;color:var(--txt);flex:1;}
.ch-inputs{display:flex;align-items:center;gap:6px;border-top:0.5px solid var(--border);padding:7px 14px 7px 30px;}
.ch-input-lbl{font-size:10px;color:var(--txt2);min-width:55px;}
.ch-price-input{width:90px;padding:5px 8px;border:0.5px solid var(--border2);border-radius:var(--radius-sm);font-size:13px;font-weight:500;color:var(--txt);background:var(--bg);text-align:right;}

/* 저장 */
.save-btn{width:100%;padding:14px;background:var(--blue);color:white;border:none;border-radius:var(--radius-sm);font-size:15px;font-weight:600;cursor:pointer;margin-top:4px;}
.save-btn:active{opacity:.85;}
.save-btn:disabled{background:var(--txt3);cursor:not-allowed;}
.result-box{padding:12px 14px;border-radius:var(--radius-sm);margin-top:10px;font-size:13px;display:none;line-height:1.5;}
.result-success{background:var(--green-bg);color:var(--green);}
.result-error{background:var(--red-bg);color:var(--red);}
.spinner{width:18px;height:18px;border:2px solid rgba(255,255,255,.3);border-top-color:white;border-radius:50%;animation:spin .8s linear infinite;display:inline-block;vertical-align:middle;margin-right:6px;}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<!-- 로그인 -->
<div class="login-wrap" id="loginWrap">
  <div class="login-card">
    <div class="login-title">관리자 로그인</div>
    <div class="login-sub">테마파크 인사이트 가격 관리</div>
    <input class="login-input" type="password" id="pwInput" placeholder="비밀번호 입력"
      onkeydown="if(event.key==='Enter')doLogin()">
    <button class="login-btn" onclick="doLogin()">로그인</button>
    <div class="login-error" id="loginError">비밀번호가 틀렸습니다.</div>
  </div>
</div>

<!-- 관리자 화면 -->
<div class="admin-wrap" id="adminWrap">
  <div class="topbar">
    <div class="topbar-title">가격 관리</div>
    <button class="logout-btn" onclick="doLogout()">로그아웃</button>
  </div>
  <div class="content">
    <div class="info-box">
      💡 공식 홈페이지에서 현재 시즌 가격 확인 후 수정해주세요.<br>
      저장 시 GitHub가 자동 업데이트되고 <b>2~3분 후</b> 앱에 반영돼요.<br>
      채널 할인금액 = 해당 채널에서 실제 판매되는 <b>대인 기준 금액</b>을 입력하세요.
    </div>

    <div class="sec-label">파크 선택</div>
    <select class="park-select" id="parkSelect" onchange="loadParkData()">
      <option value="">파크를 선택하세요</option>
    </select>

    <div id="editArea" style="display:none;">

      <!-- 시즌 정보 -->
      <div class="card">
        <div class="card-hd">시즌 정보</div>
        <div class="field-row">
          <div class="field-label">시즌명</div>
          <input class="field-input" id="seasonName" placeholder="예: 로우 시즌 (2026.03~05)">
        </div>
        <div class="field-row">
          <div class="field-label">공지사항</div>
          <input class="field-input" id="noticeText" placeholder="예: 매주 월·화 휴장">
        </div>
      </div>

      <!-- 티켓 가격 -->
      <div class="card">
        <div class="card-hd">
          티켓 가격
          <span class="card-hd-note" id="ticketNoteLabel"></span>
        </div>
        <div id="ticketRows"></div>
      </div>

      <!-- 채널별 할인금액 -->
      <div class="card">
        <div class="card-hd">
          채널별 판매금액
          <span class="card-hd-note">대인 종일권 기준</span>
        </div>
        <div id="channelRows"></div>
      </div>

      <button class="save-btn" id="saveBtn" onclick="saveAll()">
        저장하고 GitHub 업데이트
      </button>
      <div class="result-box" id="resultBox"></div>
    </div>
  </div>
</div>

<script>
const API = '/api';
let adminToken = '';
let parkList = [];
let currentParkData = null;
let currentParkKey = '';

const CH_INFO = {
  home:     { name:'공식 홈페이지', color:'#888' },
  nori:     { name:'놀이의발견',    color:'#7C3AED' },
  naver:    { name:'네이버',        color:'#03C75A' },
  coupang:  { name:'쿠팡',          color:'#E67E00' },
  kakao:    { name:'카카오',        color:'#92400E' },
  yanolja:  { name:'야놀자',        color:'#FF4E96' },
  yeogi:    { name:'여기어때',      color:'#00BCD4' },
  gmarket:  { name:'지마켓',        color:'#854F0B' },
  '11st':   { name:'11번가',        color:'#993C1D' },
  auction:  { name:'옥션',          color:'#3B6D11' },
  kidsnote: { name:'키즈노트',      color:'#534AB7' },
  mrt:      { name:'마이리얼트립',  color:'#0369A1' },
};

// ── 로그인 ────────────────────────────────────────────────────
async function doLogin() {
  const pw = document.getElementById('pwInput').value;
  if (!pw) return;
  try {
    const res = await fetch(`${API}/admin/login`, {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ password: pw })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error);
    adminToken = data.token;
    document.getElementById('loginWrap').style.display = 'none';
    document.getElementById('adminWrap').style.display = 'block';
    initAdmin();
  } catch(e) {
    const el = document.getElementById('loginError');
    el.style.display = 'block';
    el.textContent = e.message || '비밀번호가 틀렸습니다.';
  }
}
function doLogout() {
  adminToken = '';
  document.getElementById('loginWrap').style.display = 'flex';
  document.getElementById('adminWrap').style.display = 'none';
  document.getElementById('pwInput').value = '';
}

// ── 초기화 ────────────────────────────────────────────────────
async function initAdmin() {
  const res = await fetch(`${API}/parks`);
  parkList = await res.json();
  const sel = document.getElementById('parkSelect');
  sel.innerHTML = '<option value="">파크를 선택하세요</option>' +
    parkList.map(p => `<option value="${p.key}">${p.name}</option>`).join('');
}

// ── 파크 데이터 로드 ──────────────────────────────────────────
async function loadParkData() {
  currentParkKey = document.getElementById('parkSelect').value;
  if (!currentParkKey) {
    document.getElementById('editArea').style.display = 'none';
    return;
  }
  const res = await fetch(`${API}/prices?park=${currentParkKey}`);
  currentParkData = await res.json();
  document.getElementById('editArea').style.display = 'block';
  document.getElementById('resultBox').style.display = 'none';
  renderEditor();
}

// ── 편집 UI 렌더링 ────────────────────────────────────────────
function renderEditor() {
  const d = currentParkData;

  // 시즌 정보
  document.getElementById('seasonName').value = d.currentSeason || '';
  document.getElementById('noticeText').value = d.notice || '';

  // ticketNote (아쿠아필드, 아산스파비스, 스플라스)
  const noteEl = document.getElementById('ticketNoteLabel');
  noteEl.textContent = d.ticketNote || '';

  // ── 티켓 가격 렌더링 ──────────────────────────────────────
  const ticketRows = document.getElementById('ticketRows');
  ticketRows.innerHTML = d.tickets.map((t, ti) => {
    const priceKeys = Object.keys(t.prices);
    const priceRowsHTML = priceKeys.map(pk => {
      const lbl = t.priceLabels?.[pk] || pk;
      const val = t.prices[pk];
      return `<div class="price-row">
        <div class="price-lbl">${lbl}</div>
        <div class="price-input-wrap">
          <input class="price-input" type="number" step="1000"
            id="ticket_${ti}_${pk}" value="${val}">
          <span class="price-unit">원</span>
        </div>
      </div>`;
    }).join('');

    return `<div class="ticket-block">
      <div class="ticket-block-hd">
        <span class="ticket-name">${t.label}</span>
        <span class="ticket-time">${t.time || ''}</span>
      </div>
      ${priceRowsHTML}
    </div>`;
  }).join('');

  // ── 채널별 할인금액 렌더링 ────────────────────────────────
  const discounts = d.channelDiscounts || {};
  const channelRows = document.getElementById('channelRows');

  // 공홈 포함 전체 채널 순서
  const chKeys = ['home','nori','naver','coupang','kakao','yanolja','yeogi','gmarket','11st','auction','kidsnote','mrt'];

  channelRows.innerHTML = chKeys.map(key => {
    if (!discounts[key]) return ''; // 이 파크에 없는 채널은 숨김
    const info = CH_INFO[key] || { name: key, color: '#888' };
    const wd = discounts[key].weekday || 0;
    const we = discounts[key].weekend || 0;
    return `<div class="ch-block">
      <div class="ch-hd">
        <div class="ch-dot" style="background:${info.color}"></div>
        <div class="ch-name-txt">${info.name}</div>
      </div>
      <div class="ch-inputs">
        <span class="ch-input-lbl">주중 대인</span>
        <input class="ch-price-input" type="number" step="100"
          id="ch_${key}_weekday" value="${wd}">
        <span class="price-unit">원</span>
        <span class="ch-input-lbl" style="margin-left:8px;">주말·공휴일</span>
        <input class="ch-price-input" type="number" step="100"
          id="ch_${key}_weekend" value="${we}">
        <span class="price-unit">원</span>
      </div>
    </div>`;
  }).join('');
}

// ── 전체 저장 ─────────────────────────────────────────────────
async function saveAll() {
  const btn = document.getElementById('saveBtn');
  const resultBox = document.getElementById('resultBox');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>GitHub 업데이트 중...';
  resultBox.style.display = 'none';

  try {
    const d = currentParkData;

    // 티켓 가격 수집
    const updatedTickets = d.tickets.map((t, ti) => {
      const newPrices = {};
      Object.keys(t.prices).forEach(pk => {
        const el = document.getElementById(`ticket_${ti}_${pk}`);
        newPrices[pk] = el ? (parseInt(el.value) || t.prices[pk]) : t.prices[pk];
      });
      return { ...t, prices: newPrices };
    });

    // 채널 할인금액 수집
    const updatedDiscounts = { ...(d.channelDiscounts || {}) };
    Object.keys(updatedDiscounts).forEach(key => {
      const wdEl = document.getElementById(`ch_${key}_weekday`);
      const weEl = document.getElementById(`ch_${key}_weekend`);
      if (wdEl) updatedDiscounts[key] = {
        ...updatedDiscounts[key],
        weekday: parseInt(wdEl.value) || updatedDiscounts[key].weekday,
        weekend: parseInt(weEl.value) || updatedDiscounts[key].weekend
      };
    });

    const updatedData = {
      ...d,
      tickets: updatedTickets,
      channelDiscounts: updatedDiscounts,
      currentSeason: document.getElementById('seasonName').value,
      notice: document.getElementById('noticeText').value,
      updatedAt: new Date().toISOString().slice(0,10)
    };

    const res = await fetch(`${API}/admin/update-price`, {
      method:'POST',
      headers:{
        'Content-Type':'application/json',
        'x-admin-token': adminToken
      },
      body: JSON.stringify({ parkKey: currentParkKey, updatedData })
    });
    const result = await res.json();
    if (!res.ok) throw new Error(result.error);

    resultBox.className = 'result-box result-success';
    resultBox.innerHTML = `✅ ${result.message}`;
    resultBox.style.display = 'block';
    currentParkData = updatedData;

  } catch(e) {
    resultBox.className = 'result-box result-error';
    resultBox.innerHTML = `❌ 오류: ${e.message}`;
    resultBox.style.display = 'block';
  } finally {
    btn.disabled = false;
    btn.innerHTML = '저장하고 GitHub 업데이트';
  }
}
</script>
</body>
</html>
